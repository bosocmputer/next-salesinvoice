services:
  backend:
    build:
      context: ./backend
    container_name: next-salesinvoice-backend
    ports:
      - "8085:8080"
    environment:
      SERVER_ADDR: ":8080"
      APP_ENV: production
      GIN_MODE: release
      SESSION_SECRET: ${SESSION_SECRET}
      NSI_DATABASE_SETUP_SECRET: ${NSI_DATABASE_SETUP_SECRET:-}
      SML_DB_HOST: ${SML_DB_HOST}
      SML_DB_PORT: ${SML_DB_PORT:-5432}
      SML_DB_NAME: ${SML_DB_NAME}
      SML_DB_USER: ${SML_DB_USER}
      SML_DB_PASSWORD: ${SML_DB_PASSWORD}
      SML_DB_SSLMODE: ${SML_DB_SSLMODE:-disable}
      SML_DB_SCHEMA: ${SML_DB_SCHEMA:-public}
      SML_DB_MAX_CONNS: ${SML_DB_MAX_CONNS:-3}
    mem_limit: 256m
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: next-salesinvoice-frontend
    ports:
      - "3040:80"
    depends_on:
      - backend
    mem_limit: 128m
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: next-salesinvoice-prometheus
    profiles: ["observability"]
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      - backend
    mem_limit: 256m
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    container_name: next-salesinvoice-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3050:3000"
    depends_on:
      - prometheus
    mem_limit: 256m
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

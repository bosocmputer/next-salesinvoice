services:
  backend:
    build:
      context: ./backend
    container_name: next-salesinvoice-backend
    ports:
      - "8085:8080"
    environment:
      SERVER_ADDR: ":8080"
      APP_ENV: production
      GIN_MODE: release
      SESSION_SECRET: ${SESSION_SECRET}
      NSI_DATABASE_SETUP_SECRET: ${NSI_DATABASE_SETUP_SECRET:-}
      SML_DB_HOST: ${SML_DB_HOST}
      SML_DB_PORT: ${SML_DB_PORT:-5432}
      SML_DB_NAME: ${SML_DB_NAME}
      SML_DB_USER: ${SML_DB_USER}
      SML_DB_PASSWORD: ${SML_DB_PASSWORD}
      SML_DB_SSLMODE: ${SML_DB_SSLMODE:-disable}
      SML_DB_SCHEMA: ${SML_DB_SCHEMA:-public}
      SML_DB_MAX_CONNS: ${SML_DB_MAX_CONNS:-3}
    mem_limit: 256m
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: next-salesinvoice-frontend
    ports:
      - "3040:80"
    depends_on:
      - backend
    mem_limit: 128m
    restart: unless-stopped

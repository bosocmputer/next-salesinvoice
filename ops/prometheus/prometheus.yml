global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: next-salesinvoice

scrape_configs:
  - job_name: nsi-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8080
        labels:
          service: backend
          env: production

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
